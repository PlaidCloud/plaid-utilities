name: Lint and Test PlaidCloud Utilities
on:
  pull_request:
    branches:
      - master
jobs:
  reviewdog:
    name: Lint PlaidCloud Utilities w ReviewDog
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Ensure python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      - name: Checkout code
        uses: actions/checkout@v4
      - name: Install dependencies
        run: pip install -e .[test]; pip install -q pylint==${{ secrets.PYLINT_VERSION }};
      - name: License Checker
        uses: andersy005/gh-action-py-liccheck@main
        with:
          strategy-ini-file: ./liccheck.ini
          level: cautious
          requirements-txt-file: ./requirements.txt
          liccheck-version: ${{ secrets.LICCHECK_VERSION }}
      - name: Install ReviewDog
        uses: reviewdog/action-setup@v1
      - name: Perform Lint
        env:
          REVIEWDOG_GITHUB_API_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          pylint -s n -f text plaidcloud 2>&1 | reviewdog -efm="%f:%l:%c: %m" -name="PyLint" -reporter=github-check -level=warning
  test:
    name: Run Tests
    runs-on: ubuntu-latest
    timeout-minutes: 10
    permissions:
      checks: write
      pull-requests: write
    steps:
      - name: Ensure python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      - name: Checkout code
        uses: actions/checkout@v4
      - name: Install dependencies
        run: pip install -e ".[test]"
      - name: Run pytest with coverage
        # addopts in pyproject.toml already produces pytestresult.xml and coverage.xml
        run: pytest
      - name: Test Results
        if: always()
        uses: mikepenz/action-junit-report@v5
        with:
          report_paths: pytestresult.xml
          check_name: Test Results
      - name: Pytest Coverage Comment
        if: always()
        uses: MishaKav/pytest-coverage-comment@v1.7.1
        with:
          pytest-xml-coverage-path: coverage.xml
          junitxml-path: pytestresult.xml
